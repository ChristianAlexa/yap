name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # yap is macOS-only (playback uses afplay), but CI runs on ubuntu-latest because
    # only the headless smoke modes (--dead-port, --empty-input) run here — neither
    # invokes afplay. Do NOT add `node smoke.js` (no flags) or `--double-call` here;
    # both spawn afplay and will fail on Linux.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.11', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      # These two smoke modes don't need Kokoros, so they run in CI:
      #   --dead-port  asserts the tts_unavailable shape (closed port)
      #   --empty-input asserts the empty_input shape (strips to "")
      - run: node smoke.js --dead-port
      - run: node smoke.js --empty-input
